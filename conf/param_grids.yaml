# Parameter grid definitions for Stage 1 grid search.
# Each method lists its searchable parameters and the values to test.
# All combinations are generated as a factorial grid (unless noted).

proseg:
  # Cell shape compactness penalty: lower = more elongated cells allowed (default: 0.04)
  cell_compactness: [0.02, 0.04, 0.08]
  # Max distance a transcript can be from any nucleus to be included (µm, default: 60)
  max_transcript_nucleus_distance: [30, 60, 100]
  # Voxel resolution for segmentation (µm, default: 1.0)
  voxel_size: [0.5, 1.0, 2.0]
  # Probability of transcript diffusion model (default: 0.2)
  diffusion_probability: [0.1, 0.2, 0.4]
  # Full factorial: 3×3×3×3 = 81 — use Latin-hypercube sampling to ~27 combos
  max_combinations: 27

cellpose:
  # Expected cell diameter in pixels (0.2125 µm/px → 30px ≈ 6.4 µm)
  diameter: [20, 30, 40]
  # Flow error threshold for cell filtering (0 = strictest)
  flow_threshold: [0.0, 0.4, 0.8]
  # Whether to apply RESOLIFT sharpening before segmentation
  sharpen_tiff: [false, true]
  # Full factorial: 3×3×2 = 18 combos

segger:
  # Minimum transcripts per cell to retain a cell
  min_transcripts_per_cell: [3, 5, 10]
  # Spatial tile width/height for graph construction (microns)
  tile_size: [80, 120, 160]
  # Full factorial: 3×3 = 9 combos

xr:
  # Nuclear expansion distance in microns
  expansion_distance: [3, 5, 8]
  # Minimum DAPI peak intensity for nucleus detection
  dapi_filter: [50, 100, 150]
  # Whether to use boundary stain (ATP1A1/E-Cadherin/CD45)
  boundary_stain: [true, false]
  # Full factorial: 3×3×2 = 18 combos
